name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        env:
          TZ: Asia/Ho_Chi_Minh
        run: |
          mkdir -p _site
          cp index.html styles.css script.js manifest.webmanifest _site/
          stamp="$(date +'%H:%M %d%m%y')"
          cat > _site/build-meta.js <<EOF
          window.APP_VERSION = "v01.00";
          window.APP_BUILD_STAMP = "${stamp}";
          window.APP_AUTHOR = "Ti\u1ebfn \u0110\u1ee9c";
          EOF
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
